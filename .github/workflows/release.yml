name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev dpkg

      - name: Build .deb package
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          cargo install cargo-deb --locked
          cargo deb --output target/debian/markdownviewer_${VERSION}_amd64.deb

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/markdownviewer_*_amd64.deb

  build-binary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build release binary
        run: cargo build --release

      - name: Create tarball
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          tar czf markdownviewer_${VERSION}_amd64.tar.gz \
            --transform "s|^|markdownviewer/|" \
            target/release/markdownviewer \
            packaging/markdownviewer.desktop \
            icons/app-icon-16.png icons/app-icon-32.png icons/app-icon-48.png icons/app-icon-64.png icons/app-icon-128.png icons/app-icon-256.png icons/app-icon-512.png

      - name: Upload binary tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: markdownviewer_*_amd64.tar.gz

  update-pkgbuild:
    runs-on: ubuntu-24.04
    needs: [build-binary]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PKGBUILD sha256sum
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          TAG_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz"
          curl -sL "$TAG_URL" -o /tmp/release.tar.gz
          NEW_SHA=$(sha256sum /tmp/release.tar.gz | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/PKGBUILD
          sed -i "s/^sha256sums=(.*)/sha256sums=(\"${NEW_SHA}\")/" packaging/PKGBUILD

      - name: Commit and push PKGBUILD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/PKGBUILD
          git commit -m "fix: update PKGBUILD for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:master
