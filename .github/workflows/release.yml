name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev dpkg

      - name: Build .deb package
        run: |
          cargo install cargo-deb --locked
          cargo deb --output target/debian/markdownviewer_${{ github.ref_name#v }}_amd64.deb

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/markdownviewer_${{ github.ref_name#v }}_amd64.deb

  build-binary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build release binary
        run: cargo build --release

      - name: Create tarball
        run: |
          tar czf markdownviewer_${{ github.ref_name#v }}_amd64.tar.gz \
            --transform "s|^|markdownviewer/|" \
            -C target/release markdownviewer

      - name: Upload binary tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: markdownviewer_${{ github.ref_name#v }}_amd64.tar.gz
