<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>{{STYLES}}</style>
<script><!-- MERMAID_JS --></script>
</head>
<body>
{{CONTENT}}
<script>
function replaceContent(bodyHtml) {
    document.body.innerHTML = bodyHtml;
    if (typeof mermaid !== 'undefined') {
        mermaid.initialize({startOnLoad: false, animate: false, elk: { animate: false }});
        mermaid.run().catch(function(e) { console.error('[mdviewer] mermaid error:', e); });
    }
}
</script>
<script>
mermaid.initialize({startOnLoad: true, animate: false, elk: { animate: false }});
</script>
<script>
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === 'd' || e.key === 'D' || e.key === 'q' || e.key === 'Q' || e.key === 'w' || e.key === 'W')) {
        e.preventDefault();
        window.ipc.postMessage('{"type":"close"}');
    } else if (e.key === 'Escape') {
        e.preventDefault();
        window.ipc.postMessage('{"type":"close"}');
    } else if (e.key === 'q' || e.key === 'Q') {
        e.preventDefault();
        window.ipc.postMessage('{"type":"close"}');
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        window.ipc.postMessage('{"type":"navigate","direction":"' + e.key.replace('ArrowLeft', 'prev').replace('ArrowRight', 'next') + '"}');
    }
});
</script>
</body>
</html>
